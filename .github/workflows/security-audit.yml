name: Security Audit (pip-audit)

# Scans our Python dependencies for known vulnerabilities (Software Composition
# Analysis). Runs when dependencies change, weekly, and on demand.
on:
  push:
    branches: [main]
    paths: ['requirements*.txt']
  pull_request:
    branches: [main]
    paths: ['requirements*.txt']
  schedule:
    - cron: "0 9 * * 1"   # every Monday 09:00 UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit on requirements
        run: pip-audit -r requirements.txt
