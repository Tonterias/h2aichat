name: "CLA Assistant"

# Every pull-request author must sign the Contributor License Agreement (CLA.md)
# before their PR can be merged. To sign, they post a one-line comment on the PR;
# the bot records the signature in a dedicated `cla-signatures` branch (so `main`
# stays clean) and turns the PR status check green.
#
# Uses only the automatic GITHUB_TOKEN — no external service, no extra secrets.
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recreate-signatures' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: 'https://github.com/Tonterias/h2aichat/blob/main/CLA.md'
          path-to-signatures: 'signatures/cla.json'
          branch: 'cla-signatures'
          allowlist: 'Tonterias,dependabot*'
          custom-notsigned-prcomment: 'Thank you for your contribution! Before we can merge it, please read our [Contributor License Agreement](https://github.com/Tonterias/h2aichat/blob/main/CLA.md) and sign it by posting the exact comment below on this pull request.'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✅ Thank you!'
